name: Build documentation

on:
  pull_request:

  push:
    branches:
      - main

jobs:
  # emulate the readthedocs build system:
  # - use ubuntu 18.04
  # - do not activate conda env, instead put bin/ on PATH
  # - use `setup.py install`

  build-docs:
    runs-on: ubuntu-22.04

    defaults:
      run:
        shell: bash -l {0}

    steps:
      # fetch-depth: 0 gets full history and tags so versioneer can compute a version
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: conda-incubator/setup-miniconda@v2
        with:
          activate-environment: mpi4jax-docs
          environment-file: docs/environment.yml
          auto-activate-base: false
          # same as RTD
          miniforge-variant: Mambaforge
          miniforge-version: "23.11.0-0"
          use-mamba: true

      - name: Install mpi4jax
        run: |
          python setup.py install

      - name: Build docs
        run: |
          cd docs
          make html SPHINXOPTS="-W --keep-going"
